[tool.mypy]
plugins = ["pydantic.mypy"]
strict = True
warn_unreachable = True
follow_imports = "silent"
exclude = ["venv", ".git", "__pycache__", "frontend", ".vscode", ".github", "docker"]

[tool.pydantic-mypy]
init_forbid_extra = True
init_typed = True
warn_required_dynamic_aliases = True
warn_untyped_fields = True

[tool.flake8]
max-line-length = 120
extend-ignore = "E203,W503,Q003"
exclude = ["venv", ".git", "__pycache__", ".vscode", ".github", "docker"]
max-complexity = 15
count = True
statistics = True
inline-quotes = "'"
per-file-ignores = [
    "./shared/mortgage/se/*.py:E501,F722",
    "./shared/mortgage/no/*.py:E501,F722",
    "./shared/blanco/se/*.py:E501,F722,E126,E241",
    "./shared/blanco/no/*.py:E501,F722,E126,E241",
    "./docker/*:F821",
    "./tests/*:T20",
]

[pylint.MESSAGES CONTROL]
disable = all
enable = ["W0613", "W0101", "W0703"]

[pylint.EXCLUDES]
exclude = ["docker/debug_ssl_patch.py"]

[tool.black]
line-length = 120
target-version = ["py310"]
include = "\.pyi?$"
extend-exclude = """
/(
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
  | temporary
)/
"""

[tool.isort]
profile = "black"
line_length = 120
skip_gitignore = true
