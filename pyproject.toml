[tool.mypy]
plugins = ["pydantic.mypy"]
strict = true
warn_unreachable = true

[tool.pydantic.mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
warn_untyped_fields = true

[tool.flake8]
max-line-length = 120
extend-ignore = "E203,W503,Q003"
exclude = ["venv", ".git", "__pycache__", ".vscode", ".github", "docker"]
max-complexity = 15

[tool.black]
line-length = 120
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 120
skip_gitignore = true
